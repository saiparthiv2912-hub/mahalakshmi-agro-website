<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Quote Requests · Mahalaxmi Agro Industries</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --rice:#EFE6D0; --charcoal:#2E2115; --charcoal-soft:#4A3728;
    --gold:#B9791C; --gold-deep:#8C5D14; --paddy:#57683A; --cream-card:#F8F3E6;
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--rice); color:var(--charcoal); font-family:'Work Sans',sans-serif; }
  header{ background:var(--charcoal); color:var(--rice); padding:20px 32px; display:flex; justify-content:space-between; align-items:center; }
  header h1{ font-family:'Fraunces',serif; font-size:20px; margin:0; }
  header .sub{ font-family:'IBM Plex Mono',monospace; font-size:12px; color:rgba(239,230,208,0.7); }
  main{ max-width:1200px; margin:0 auto; padding:32px; }
  .toolbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:12px; }
  .toolbar button{
    background:var(--gold); color:var(--rice); border:none; padding:10px 16px;
    border-radius:4px; font-weight:600; cursor:pointer; font-size:13.5px;
  }
  .toolbar button:hover{ background:var(--gold-deep); }
  .stats{ display:flex; gap:14px; flex-wrap:wrap; margin-bottom:20px; }
  .stat{ background:var(--cream-card); border:1px solid rgba(46,33,21,0.12); border-radius:6px; padding:14px 18px; min-width:110px; }
  .stat .n{ font-family:'Fraunces',serif; font-size:24px; font-weight:600; }
  .stat .l{ font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; color:var(--charcoal-soft); }
  table{ width:100%; border-collapse:collapse; background:var(--cream-card); border-radius:6px; overflow:hidden; }
  th,td{ padding:12px 14px; text-align:left; font-size:13.5px; border-bottom:1px solid rgba(46,33,21,0.1); }
  th{ font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--charcoal-soft); background:rgba(46,33,21,0.04); }
  tr:last-child td{ border-bottom:none; }
  .status{ font-family:'IBM Plex Mono',monospace; font-size:11px; padding:4px 8px; border-radius:3px; text-transform:uppercase; border:none; }
  .status-new{ background:#e8dfc4; color:var(--gold-deep); }
  .status-contacted{ background:#dde6cf; color:var(--paddy); }
  .status-quoted{ background:#cfe0e6; color:#2B3A42; }
  .status-won{ background:#c8e6c9; color:#256029; }
  .status-lost{ background:#f0cccc; color:#8a2c2c; }
  .del-btn{ background:none; border:1px solid rgba(46,33,21,0.3); color:var(--charcoal-soft); border-radius:4px; padding:5px 10px; cursor:pointer; font-size:12px; }
  .del-btn:hover{ border-color:#8a2c2c; color:#8a2c2c; }
  .empty{ padding:40px; text-align:center; color:var(--charcoal-soft); }
  .msg-cell{ max-width:220px; white-space:normal; color:var(--charcoal-soft); }
</style>
</head>
<body>
<header>
  <h1>Mahalaxmi Agro Industries — Admin</h1>
  <div class="sub">Wholesale quote requests</div>
</header>
<main>
  <div class="stats" id="stats"></div>
  <div class="toolbar">
    <div></div>
    <button onclick="loadQuotes()">Refresh</button>
  </div>
  <table>
    <thead>
      <tr>
        <th>Date</th><th>Name</th><th>Business</th><th>Variety</th><th>Qty (t)</th>
        <th>Phone</th><th>Email</th><th>Message</th><th>Status</th><th></th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none;">No quote requests yet.</div>
</main>

<script>
async function loadQuotes(){
  const res = await fetch('/api/quotes');
  if(!res.ok){ document.getElementById('rows').innerHTML=''; return; }
  const { quotes } = await res.json();
  renderStats(quotes);
  renderRows(quotes);
}

function renderStats(quotes){
  const counts = { new:0, contacted:0, quoted:0, won:0, lost:0 };
  quotes.forEach(q => { counts[q.status] = (counts[q.status]||0) + 1; });
  const el = document.getElementById('stats');
  el.innerHTML = `
    <div class="stat"><div class="n">${quotes.length}</div><div class="l">Total</div></div>
    <div class="stat"><div class="n">${counts.new}</div><div class="l">New</div></div>
    <div class="stat"><div class="n">${counts.contacted}</div><div class="l">Contacted</div></div>
    <div class="stat"><div class="n">${counts.quoted}</div><div class="l">Quoted</div></div>
    <div class="stat"><div class="n">${counts.won}</div><div class="l">Won</div></div>
  `;
}

function renderRows(quotes){
  const tbody = document.getElementById('rows');
  const emptyEl = document.getElementById('empty');
  if(!quotes.length){
    tbody.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';
  tbody.innerHTML = quotes.map(q => `
    <tr data-id="${q.id}">
      <td>${new Date(q.created_at + 'Z').toLocaleString()}</td>
      <td>${escapeHtml(q.name)}</td>
      <td>${escapeHtml(q.company || '—')}</td>
      <td>${escapeHtml(q.variety)}</td>
      <td>${q.quantity_tonnes ?? '—'}</td>
      <td>${escapeHtml(q.phone || '—')}</td>
      <td>${escapeHtml(q.email || '—')}</td>
      <td class="msg-cell">${escapeHtml(q.message || '—')}</td>
      <td>
        <select class="status status-${q.status}" onchange="updateStatus(${q.id}, this.value)">
          ${['new','contacted','quoted','won','lost'].map(s =>
            `<option value="${s}" ${s===q.status?'selected':''}>${s}</option>`).join('')}
        </select>
      </td>
      <td><button class="del-btn" onclick="removeQuote(${q.id})">Delete</button></td>
    </tr>
  `).join('');
}

async function updateStatus(id, status){
  await fetch('/api/quotes/' + id, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  });
  loadQuotes();
}

async function removeQuote(id){
  if(!confirm('Delete this quote request?')) return;
  await fetch('/api/quotes/' + id, { method: 'DELETE' });
  loadQuotes();
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

loadQuotes();
</script>
</body>
</html>
